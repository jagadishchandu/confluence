version: "3.9"
 
services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
 
  backend:
    build: ./backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
 
  ui:
    build: ./ui
    ports:
      - "8080:80"
    depends_on:
      - backend
 
volumes:
  qdrant_data:
