<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAG Chart Bot</title>

  <!-- Optional inline config (replaces ./config.js) -->
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    window.APP_CONFIG = {
      // Change this to your backend URL (same host example: "/api")
      API_BASE_URL: "http://localhost:8000"
    };
  </script>

  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <style>
    /* Code Generated by Sidekick is for learning and experimentation purposes only. */
    :root{
      --bg1:#070B14; --bg2:#0A1B2A;
      --card:rgba(255,255,255,.07);
      --cardBorder:rgba(255,255,255,.13);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --a:#86BC25; --b:#00A9E0;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text)}
    .bg{position:fixed;inset:0;z-index:-1;background:
      radial-gradient(900px 520px at 12% 18%, rgba(0,169,224,.28), transparent 60%),
      radial-gradient(820px 520px at 85% 22%, rgba(134,188,37,.22), transparent 60%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    .topbar{height:72px;display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;
      background:linear-gradient(135deg,rgba(134,188,37,.95),rgba(0,169,224,.95));
      color:#061018;font-weight:900;letter-spacing:.6px
    }
    .brandTitle{font-weight:900}
    .brandSub{font-size:12px;color:var(--muted)}
    .actions{display:flex;align-items:center;gap:12px}

    .grid{height:calc(100% - 72px);display:grid;grid-template-columns:1.05fr .95fr;gap:16px;padding:0 18px 18px}
    .card{background:var(--card);border:1px solid var(--cardBorder);border-radius:18px;
      box-shadow:0 22px 70px rgba(0,0,0,.35);backdrop-filter:blur(10px);
      overflow:hidden;display:grid;grid-template-rows:auto 1fr auto
    }
    .cardHeader{padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between}
    .cardTitle{font-weight:900}
    .status{font-size:12px;color:var(--muted)}
    .chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--cardBorder);color:var(--muted)}

    .chat{padding:12px 14px;overflow:auto}
    .msg{margin:0 0 12px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.18)}
    .msg .role{font-size:12px;color:var(--muted);margin-bottom:6px}
    .msg.user{background:rgba(0,169,224,.10);border-color:rgba(0,169,224,.24)}
    .msg.assistant{background:rgba(134,188,37,.08);border-color:rgba(134,188,37,.20)}

    .composer{display:flex;gap:10px;padding:12px 14px 14px;border-top:1px solid rgba(255,255,255,.10)}
    .input{flex:1;padding:12px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);color:var(--text);outline:none
    }
    .btn{padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.09);color:var(--text);cursor:pointer
    }
    .btnPrimary{background:linear-gradient(135deg,rgba(134,188,37,.95),rgba(0,169,224,.82));
      border-color:rgba(255,255,255,.20);color:#061018;font-weight:900
    }
    .toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}

    .chart{width:100%;height:100%;min-height:360px;padding:8px 10px 0}
    .sources{padding:12px 14px 14px;border-top:1px solid rgba(255,255,255,.10)}
    .sourcesTitle{font-weight:900;margin-bottom:8px}
    .sourcesList{color:var(--muted);font-size:13px}
    .sourcesList a{color:rgba(0,169,224,.95);text-decoration:none}
    .sourcesList a:hover{text-decoration:underline}

    @media (max-width:980px){.grid{grid-template-columns:1fr;height:auto}.chart{min-height:320px}}
  </style>
</head>

<body>
  <div class="bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo">RAG</div>
      <div>
        <div class="brandTitle">RAG Chart Bot</div>
        <div class="brandSub">Confluence → Qdrant (local) → Bedrock</div>
      </div>
    </div>

    <div class="actions">
      <button id="syncBtn" class="btn btnPrimary">Sync Confluence</button>
      <label class="toggle">
        <input id="wantChart" type="checkbox" checked />
        <span>Chart</span>
      </label>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <div class="cardHeader">
        <div class="cardTitle">Assistant</div>
        <div id="status" class="status">Ready</div>
      </div>

      <div id="chat" class="chat"></div>

      <div class="composer">
        <input id="q" class="input" placeholder='Ask: "Incidents by month"' autocomplete="off" />
        <button id="sendBtn" class="btn">Send</button>
      </div>
    </section>

    <section class="card">
      <div class="cardHeader">
        <div class="cardTitle">Chart</div>
        <div class="chip">ECharts</div>
      </div>

      <div id="chart" class="chart"></div>

      <div class="sources">
        <div class="sourcesTitle">Sources</div>
        <div id="sourcesList" class="sourcesList">No chart yet.</div>
      </div>
    </section>
  </main>

  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    const API = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) || "http://localhost:8000";

    const chatEl = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const syncBtn = document.getElementById("syncBtn");
    const sendBtn = document.getElementById("sendBtn");
    const qInput = document.getElementById("q");
    const wantChartEl = document.getElementById("wantChart");
    const sourcesList = document.getElementById("sourcesList");

    let chart = echarts.init(document.getElementById("chart"));
    window.addEventListener("resize", () => chart.resize());

    function setStatus(t){ statusEl.textContent = t; }
    function addMsg(role, text){
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="role">${role}</div><div class="text"></div>`;
      div.querySelector(".text").textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function escapeHtml(s){ return (s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function renderSources(cits){
      if(!cits || !cits.length){ sourcesList.textContent="No sources."; return; }
      sourcesList.innerHTML = cits.slice(0,5).map(c =>
        `<div>• <a href="${c.url}" target="_blank" rel="noreferrer">${escapeHtml(c.title)}</a> <span style="opacity:.75">[${c.chunk_id}]</span></div>`
      ).join("");
    }

    function toOption(spec){
      const palette=["#86BC25","#007CB0","#046E38","#62B5E5","#BBBDBF","#ED8B00","#DA291C"];
      const data = spec.data || [];
      if(!data.length){
        return {
          title:{text: spec.title || "No chart data", left:"center", textStyle:{color:"#FFFFFF"}},
          graphic:[{type:"text", left:"center", top:"middle", style:{text:"No numeric data found in retrieved context.", fill:"rgba(255,255,255,0.70)", fontSize:14}}]
        };
      }

      const xVals=[...new Set(data.map(d=>d.x))];
      const seriesNames=[...new Set(data.map(d=>d.series||"Series"))];

      if(spec.chart_type==="pie"){
        const pieData = xVals.map(x=>{
          const ys=data.filter(d=>d.x===x).map(d=>d.y);
          return {name:x, value: ys.reduce((a,b)=>a+b,0)};
        });
        return {
          color:palette,
          title:{text:spec.title,left:"center",textStyle:{color:"#FFFFFF"}},
          tooltip:{trigger:"item"},
          legend:{bottom:0,textStyle:{color:"rgba(255,255,255,0.75)"}},
          series:[{type:"pie", radius:"60%", data:pieData}]
        };
      }

      const type = (spec.chart_type==="area") ? "line" : spec.chart_type;
      const series = seriesNames.map(name => ({
        name, type, smooth:true,
        areaStyle: spec.chart_type==="area" ? {} : undefined,
        data: xVals.map(x=>{
          const f=data.find(d=>d.x===x && (d.series||"Series")===name);
          return f ? f.y : null;
        })
      }));

      return {
        color:palette,
        title:{text:spec.title,left:"center",textStyle:{color:"#FFFFFF"}},
        tooltip:{trigger:"axis"},
        legend:{bottom:0,textStyle:{color:"rgba(255,255,255,0.75)"}},
        grid:{left:52,right:16,top:56,bottom:60},
        xAxis:{type:"category",name:spec.x_label,data:xVals,
          axisLabel:{color:"rgba(255,255,255,0.75)", rotate:(xVals.join("").length>24?30:0)},
          nameTextStyle:{color:"rgba(255,255,255,0.75)"}},
        yAxis:{type:"value",name: spec.units ? `${spec.y_label} (${spec.units})` : spec.y_label,
          axisLabel:{color:"rgba(255,255,255,0.75)"},
          splitLine:{lineStyle:{color:"rgba(255,255,255,0.08)"}},
          nameTextStyle:{color:"rgba(255,255,255,0.75)"}},
        series
      };
    }

    async function sync(){
      setStatus("Syncing...");
      syncBtn.disabled=true;
      try{
        const r = await fetch(`${API}/sync?limit=25`, {method:"POST"});
        const j = await r.json();
        addMsg("assistant", `Synced ${j.pages} pages, ${j.chunks_ingested} chunks.`);
      }catch(e){
        addMsg("assistant", `Sync failed: ${e}`);
      }finally{
        syncBtn.disabled=false;
        setStatus("Ready");
      }
    }

    async function ask(){
      const q=(qInput.value||"").trim();
      if(!q) return;
      qInput.value="";
      addMsg("user", q);

      setStatus("Thinking...");
      sendBtn.disabled=true;
      try{
        const r = await fetch(`${API}/ask`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({question:q, want_chart: !!wantChartEl.checked})
        });
        const j = await r.json();
        addMsg("assistant", j.answer || "");

        if(j.chart){
          chart.setOption(toOption(j.chart), true);
          renderSources(j.chart.citations || j.citations || []);
        } else {
          chart.clear();
          renderSources(j.citations || []);
        }
      }catch(e){
        addMsg("assistant", `Ask failed: ${e}`);
      }finally{
        sendBtn.disabled=false;
        setStatus("Ready");
      }
    }

    syncBtn.addEventListener("click", sync);
    sendBtn.addEventListener("click", ask);
    qInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") ask(); });

    addMsg("assistant","1) Click Sync Confluence  2) Ask a question");
  </script>
</body>
</html>
